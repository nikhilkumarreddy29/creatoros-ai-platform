services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: creatoros-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: creatoros-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  redis:
    image: redis:latest
    container_name: creatoros-redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16
    container_name: creatoros-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: creatoros
    ports:
      - "5432:5432"
  prometheus:
    image: prom/prometheus:latest
    container_name: creatoros-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: creatoros-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus